<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complete seu Cadastro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#3b82f6'
          }
        }
      }
    }
  </script>
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="w-full max-w-md p-6">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-8">
      <!-- Cabeçalho -->
      <div class="text-center mb-8">
        <div class="text-6xl mb-4">👋</div>
        <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-2">Bem-vindo!</h1>
        <p class="text-gray-600 dark:text-gray-400">
          Sua conta foi aprovada! Complete seu cadastro para continuar.
        </p>
      </div>

      <!-- Mensagem -->
      <div id="mensagem" class="mb-4"></div>

      <!-- Formulário -->
      <form id="formPrimeiroAcesso">
        <div class="space-y-4">
          <!-- Nome Completo -->
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
              Nome Completo *
            </label>
            <input 
              type="text" 
              id="nome" 
              required
              placeholder="Digite seu nome completo"
              class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary dark:bg-gray-700 dark:text-white"
            >
          </div>

          <!-- Telefone -->
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
              Telefone/Celular *
            </label>
            <input 
              type="tel" 
              id="telefone" 
              required
              maxlength="15"
              placeholder="(11) 98765-4321"
              class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary dark:bg-gray-700 dark:text-white"
            >
            <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">
              Formato: (DD) XXXXX-XXXX
            </p>
          </div>

          <!-- Info de E-mail -->
          <div class="bg-blue-50 dark:bg-blue-900 border border-blue-200 dark:border-blue-700 rounded-lg p-3">
            <p class="text-sm text-blue-800 dark:text-blue-200">
              📧 <strong>E-mail:</strong> <span id="emailUsuario"></span>
            </p>
          </div>

          <!-- Botão Salvar -->
          <button 
            type="submit" 
            class="w-full bg-primary hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition transform hover:scale-105"
          >
            ✅ Completar Cadastro
          </button>

          <!-- Botão Sair -->
          <button 
            type="button"
            onclick="sair()"
            class="w-full bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded-lg transition"
          >
            ← Sair
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="firebase/firebase-config.js"></script>
  <script src="firebase/services-config.js"></script>
  <script src="firebase/database.js"></script>

  <script>
    let usuarioAtual = null;

    // Verificar autenticação
    firebase.auth().onAuthStateChanged(async (user) => {
      if (!user) {
        window.location.href = 'login.html';
        return;
      }

      usuarioAtual = user;
      console.log('✅ Usuário autenticado:', user.email);
      
      // Exibir e-mail
      document.getElementById('emailUsuario').textContent = user.email;

      // Verificar se já completou o cadastro
      try {
        const perfil = await obterPerfilUsuario(user.uid);
        
        if (!perfil) {
          mostrarMensagem('erro', 'Perfil não encontrado. Entre em contato com o suporte.');
          return;
        }

        // Se não foi aprovado, voltar para login
        if (!perfil.aprovado) {
          mostrarMensagem('info', 'Aguardando aprovação do administrador...');
          setTimeout(() => window.location.href = 'login.html', 2000);
          return;
        }

        // Se já completou o cadastro, ir para cliente.html
        if (!perfil.primeiroAcesso && perfil.nome && perfil.telefone) {
          window.location.href = 'cliente.html';
          return;
        }

        console.log('📝 Primeiro acesso - aguardando dados do usuário');
      } catch (error) {
        console.error('❌ Erro ao verificar perfil:', error);
        mostrarMensagem('erro', 'Erro ao carregar perfil. Tente novamente.');
      }
    });

    // Máscara de telefone
    document.getElementById('telefone').addEventListener('input', function(e) {
      let value = e.target.value.replace(/\D/g, '');
      
      if (value.length <= 11) {
        value = value.replace(/^(\d{2})(\d)/g, '($1) $2');
        value = value.replace(/(\d{5})(\d)/, '$1-$2');
      }
      
      e.target.value = value;
    });

    // Submit do formulário
    document.getElementById('formPrimeiroAcesso').addEventListener('submit', async (e) => {
      e.preventDefault();

      const nome = document.getElementById('nome').value.trim();
      const telefone = document.getElementById('telefone').value.trim();

      if (!nome || !telefone) {
        mostrarMensagem('erro', 'Por favor, preencha todos os campos.');
        return;
      }

      // Validar telefone
      const telefoneNumeros = telefone.replace(/\D/g, '');
      if (telefoneNumeros.length < 10) {
        mostrarMensagem('erro', 'Telefone inválido. Digite no formato (DD) XXXXX-XXXX');
        return;
      }

      try {
        console.log('💾 Salvando dados do primeiro acesso...');
        
        const db = firebase.database();
        const updates = {
          nome: nome,
          nomeCompleto: nome,
          telefone: telefone,
          whatsapp: telefone,
          primeiroAcesso: false, // ⭐ Marcar que completou o primeiro acesso
          atualizadoEm: new Date().toISOString()
        };

        await db.ref(`usuarios/${usuarioAtual.uid}`).update(updates);
        
        // Atualizar displayName no Authentication
        await usuarioAtual.updateProfile({ displayName: nome });

        console.log('✅ Dados salvos com sucesso!');
        mostrarMensagem('sucesso', '✅ Cadastro completo! Redirecionando...');
        
        setTimeout(() => {
          window.location.href = 'cliente.html';
        }, 2000);

      } catch (error) {
        console.error('❌ Erro ao salvar dados:', error);
        mostrarMensagem('erro', 'Erro ao salvar dados: ' + error.message);
      }
    });

    // Sair
    async function sair() {
      try {
        await firebase.auth().signOut();
        window.location.href = 'login.html';
      } catch (error) {
        console.error('Erro ao sair:', error);
      }
    }

    // Mostrar mensagens
    function mostrarMensagem(tipo, mensagem) {
      const div = document.getElementById('mensagem');
      let classes;
      
      if (tipo === 'sucesso') {
        classes = 'bg-green-100 dark:bg-green-900 border border-green-400 text-green-700 dark:text-green-200 px-4 py-3 rounded-lg';
      } else if (tipo === 'info') {
        classes = 'bg-blue-100 dark:bg-blue-900 border border-blue-400 text-blue-700 dark:text-blue-200 px-4 py-3 rounded-lg';
      } else {
        classes = 'bg-red-100 dark:bg-red-900 border border-red-400 text-red-700 dark:text-red-200 px-4 py-3 rounded-lg';
      }
      
      div.innerHTML = `<div class="${classes}">${mensagem}</div>`;
      setTimeout(() => div.innerHTML = '', 5000);
    }
  </script>
</body>
</html>
