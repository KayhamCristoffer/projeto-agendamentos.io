<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Sistema de Agendamentos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#3b82f6'
          }
        }
      }
    }
  </script>
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
  </style>
</head>
<body>
  <div class="w-full max-w-md">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-6 sm:p-8">
      <!-- Logo/Título -->
      <div class="text-center mb-6">
        <div class="text-5xl sm:text-6xl mb-3">✂️</div>
        <h1 class="text-2xl sm:text-3xl font-bold text-gray-900 dark:text-white mb-2">Criar Conta</h1>
        <p class="text-sm text-gray-600 dark:text-gray-400">
          Preencha seus dados para começar
        </p>
      </div>

      <!-- Formulário -->
      <form id="formCadastro" class="space-y-4">
        <!-- Nome Completo -->
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
            👤 Nome Completo *
          </label>
          <input 
            type="text" 
            id="nome" 
            required
            minlength="3"
            placeholder="João Silva"
            class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent dark:bg-gray-700 dark:text-white text-base"
          >
        </div>

        <!-- Telefone/WhatsApp -->
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
            📱 Telefone/WhatsApp *
          </label>
          <input 
            type="tel" 
            id="telefone" 
            required
            maxlength="15"
            placeholder="(11) 98765-4321"
            class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent dark:bg-gray-700 dark:text-white text-base"
          >
          <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">
            Formato: (DD) XXXXX-XXXX
          </p>
        </div>

        <!-- Email -->
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
            📧 E-mail *
          </label>
          <input 
            type="email" 
            id="email" 
            required
            placeholder="seu@email.com"
            class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent dark:bg-gray-700 dark:text-white text-base"
          >
        </div>

        <!-- Senha -->
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
            🔒 Senha *
          </label>
          <div class="relative">
            <input 
              type="password" 
              id="senha" 
              required
              minlength="6"
              placeholder="Mínimo 6 caracteres"
              class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent dark:bg-gray-700 dark:text-white text-base pr-12"
            >
            <button 
              type="button"
              onclick="togglePassword('senha', 'iconSenha')"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-xl hover:opacity-70">
              <span id="iconSenha">👁️</span>
            </button>
          </div>
        </div>

        <!-- Confirmar Senha -->
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
            🔒 Confirmar Senha *
          </label>
          <div class="relative">
            <input 
              type="password" 
              id="confirmaSenha" 
              required
              minlength="6"
              placeholder="Digite a senha novamente"
              class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent dark:bg-gray-700 dark:text-white text-base pr-12"
            >
            <button 
              type="button"
              onclick="togglePassword('confirmaSenha', 'iconConfirma')"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-xl hover:opacity-70">
              <span id="iconConfirma">👁️</span>
            </button>
          </div>
        </div>

        <!-- Botão Cadastrar -->
        <button 
          type="submit" 
          class="w-full bg-primary hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition transform hover:scale-105 text-base sm:text-lg"
        >
          ✅ Criar Conta
        </button>
      </form>

      <!-- Link para Login -->
      <div class="mt-6 text-center">
        <p class="text-sm text-gray-600 dark:text-gray-400">
          Já tem uma conta?
          <a href="login.html" class="text-primary hover:underline font-semibold">
            Fazer Login
          </a>
        </p>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="firebase/firebase-config.js"></script>
  <script src="firebase/services-config.js"></script>
  <script src="firebase/database.js"></script>
  <script src="assets/toast.js"></script>
  <script src="assets/business-rules.js"></script>

  <script>
    // Máscara de telefone
    document.getElementById('telefone').addEventListener('input', function(e) {
      e.target.value = BusinessRules.format.phone(e.target.value);
    });

    // Toggle senha
    function togglePassword(fieldId, iconId) {
      const field = document.getElementById(fieldId);
      const icon = document.getElementById(iconId);
      
      if (field.type === 'password') {
        field.type = 'text';
        icon.textContent = '🙈';
      } else {
        field.type = 'password';
        icon.textContent = '👁️';
      }
    }
    
    // Submit do formulário
    document.getElementById('formCadastro').addEventListener('submit', async (e) => {
      e.preventDefault();

      const nome = document.getElementById('nome').value.trim();
      const telefone = document.getElementById('telefone').value.trim();
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      const confirmaSenha = document.getElementById('confirmaSenha').value;

      // Validações
      if (!BusinessRules.validation.isValidName(nome)) {
        Toast.error(BusinessRules.messages.validation.nameShort);
        return;
      }

      if (!BusinessRules.validation.isValidPhone(telefone)) {
        Toast.error(BusinessRules.messages.validation.phoneInvalid);
        return;
      }

      if (!BusinessRules.validation.isValidEmail(email)) {
        Toast.error(BusinessRules.messages.validation.emailInvalid);
        return;
      }

      if (!BusinessRules.validation.isValidPassword(senha)) {
        Toast.error(BusinessRules.messages.validation.passwordShort);
        return;
      }

      if (senha !== confirmaSenha) {
        Toast.error(BusinessRules.messages.validation.passwordMismatch);
        return;
      }

      try {
    console.log('🔥 Criando conta...');
    
    // 1. Criar usuário no Authentication
    const userCredential = await firebase.auth().createUserWithEmailAndPassword(email, senha);
    const user = userCredential.user;
    
    // 2. Atualizar o Perfil do Firebase Auth (DisplayName)
    await user.updateProfile({ displayName: nome });
    
    // 3. Montar o Objeto EXATAMENTE como o seu JSON exige
    const perfilParaODataBase = {
        nome: nome,
        nomeCompleto: nome, // Importante para o painel admin
        email: email,
        telefone: telefone,
        whatsapp: telefone, // Copia o telefone para o campo whatsapp
        role: 'cliente',
        aprovado: true,
        totalVisitas: 0,
        criadoEm: new Date().toISOString(),
        atualizadoEm: new Date().toISOString(),
        ultimaVisita: "" // Inicia vazio para novos usuários
    };

    // 4. Salvar no Realtime Database
    await firebase.database().ref(`usuarios/${user.uid}`).set(perfilParaODataBase);
    
    console.log('✅ Perfil completo gerado no Database');
    Toast.success('🎉 Conta criada com sucesso! Redirecionando...');
    
    setTimeout(() => {
        window.location.href = 'cliente.html';
    }, 2000);
        
      } catch (error) {
        console.error('❌ Erro ao criar conta:', error);
        
        let mensagem = 'Erro ao criar conta. Tente novamente.';
        
        if (error.code === 'auth/email-already-in-use') {
          mensagem = BusinessRules.messages.auth.emailInUse;
        } else if (error.code === 'auth/weak-password') {
          mensagem = BusinessRules.messages.auth.weakPassword;
        } else if (error.code === 'auth/network-request-failed') {
          mensagem = BusinessRules.messages.auth.networkError;
        }
        
        Toast.error(mensagem);
      }
    });

    // Verificar se já está logado
    firebase.auth().onAuthStateChanged(async (user) => {
      if (user) {
        const perfil = await obterPerfilUsuario(user.uid);
        if (perfil && perfil.role === 'admin') {
          window.location.href = 'admin.html';
        } else {
          window.location.href = 'cliente.html';
        }
      }
    });
  </script>
</body>
</html>
