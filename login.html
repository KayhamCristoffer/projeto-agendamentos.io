<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Sistema de Agendamentos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#3b82f6'
          }
        }
      }
    }
  </script>
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
  </style>
</head>
<body>
  <!-- Theme Toggle -->
  <button onclick="toggleTheme()" class="fixed top-4 right-4 p-3 rounded-full bg-white/90 dark:bg-gray-700/90 shadow-lg hover:shadow-xl transition z-50">
    <span id="themeIcon" class="text-xl sm:text-2xl">🌙</span>
  </button>

  <div class="w-full max-w-md">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-6 sm:p-8">
      <!-- Logo/Título -->
      <div class="text-center mb-6">
        <div class="text-5xl sm:text-6xl mb-3">📅</div>
        <h1 class="text-2xl sm:text-3xl font-bold text-gray-900 dark:text-white mb-2">Bem-vindo!</h1>
        <p class="text-sm text-gray-600 dark:text-gray-400">
          Faça login para acessar o sistema
        </p>
      </div>

      <!-- Formulário de Login -->
      <form id="formLogin" class="space-y-4">
        <!-- Email -->
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
            📧 E-mail
          </label>
          <input 
            type="email" 
            id="email" 
            required
            placeholder="seu@email.com"
            class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent dark:bg-gray-700 dark:text-white text-base"
          >
        </div>

        <!-- Senha -->
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
            🔒 Senha
          </label>
          <div class="relative">
            <input 
              type="password" 
              id="senha" 
              required
              minlength="6"
              placeholder="Sua senha"
              class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent dark:bg-gray-700 dark:text-white text-base pr-12"
            >
            <button 
              type="button"
              onclick="togglePassword()"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-xl hover:opacity-70">
              <span id="iconSenha">👁️</span>
            </button>
          </div>
        </div>

        <!-- Esqueci Senha -->
        <div class="text-right">
          <a href="#" onclick="showRecoverPassword(); return false;" class="text-sm text-primary hover:underline">
            Esqueceu a senha?
          </a>
        </div>

        <!-- Botão Entrar -->
        <button 
          type="submit" 
          class="w-full bg-primary hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition transform hover:scale-105 text-base sm:text-lg"
        >
          🚀 Entrar
        </button>
      </form>

      <!-- Link para Cadastro -->
      <div class="mt-6 text-center">
        <p class="text-sm text-gray-600 dark:text-gray-400">
          Não tem uma conta?
          <a href="cadastro.html" class="text-primary hover:underline font-semibold">
            Criar Conta
          </a>
        </p>
      </div>
    </div>

    <!-- Modal Recuperar Senha -->
    <div id="modalRecuperarSenha" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
      <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-full max-w-md p-6">
        <h3 class="text-xl font-bold text-gray-900 dark:text-white mb-4">🔑 Recuperar Senha</h3>
        <form id="formRecuperar">
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
              Digite seu e-mail
            </label>
            <input 
              type="email" 
              id="emailRecuperar" 
              required
              placeholder="seu@email.com"
              class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary dark:bg-gray-700 dark:text-white"
            >
          </div>
          <div class="flex gap-2">
            <button 
              type="submit"
              class="flex-1 bg-primary hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition">
              ✉️ Enviar
            </button>
            <button 
              type="button"
              onclick="closeRecoverPassword()"
              class="flex-1 bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded-lg transition">
              Cancelar
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="firebase/firebase-config.js"></script>
  <script src="firebase/services-config.js"></script>
  <script src="firebase/database.js"></script>
  <script src="assets/toast.js"></script>
  <script src="assets/business-rules.js"></script>
  <script src="assets/theme.js"></script>

  <script>
    // Toggle senha
    function togglePassword() {
      const field = document.getElementById('senha');
      const icon = document.getElementById('iconSenha');
      
      if (field.type === 'password') {
        field.type = 'text';
        icon.textContent = '🙈';
      } else {
        field.type = 'password';
        icon.textContent = '👁️';
      }
    }

    // Modal recuperar senha
    function showRecoverPassword() {
      document.getElementById('modalRecuperarSenha').classList.remove('hidden');
    }

    function closeRecoverPassword() {
      document.getElementById('modalRecuperarSenha').classList.add('hidden');
      document.getElementById('formRecuperar').reset();
    }

    // Submit Login
    document.getElementById('formLogin').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;

      if (!BusinessRules.validation.isValidEmail(email)) {
        Toast.error(BusinessRules.messages.validation.emailInvalid);
        return;
      }

      try {
        const userCredential = await firebase.auth().signInWithEmailAndPassword(email, senha);
        const user = userCredential.user;
        
        const perfil = await obterPerfilUsuario(user.uid);
        
        if (perfil && perfil.role === 'admin') {
          Toast.success('Bem-vindo, Admin!');
          setTimeout(() => window.location.href = 'admin.html', 1000);
        } else {
          Toast.success('Login realizado com sucesso!');
          setTimeout(() => window.location.href = 'cliente.html', 1000);
        }
      } catch (error) {
        console.error('❌ Erro ao fazer login:', error);
        Toast.error(BusinessRules.messages.auth.invalidCredentials);
      }
    });

    // Submit Recuperar Senha
    document.getElementById('formRecuperar').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('emailRecuperar').value.trim();

      if (!BusinessRules.validation.isValidEmail(email)) {
        Toast.error(BusinessRules.messages.validation.emailInvalid);
        return;
      }

      try {
        await firebase.auth().sendPasswordResetEmail(email);
        Toast.success('📧 E-mail de recuperação enviado! Verifique sua caixa de entrada.');
        closeRecoverPassword();
      } catch (error) {
        console.error('❌ Erro ao enviar e-mail:', error);
        
        if (error.code === 'auth/user-not-found') {
          Toast.error('E-mail não encontrado');
        } else {
          Toast.error('Erro ao enviar e-mail. Tente novamente.');
        }
      }
    });

    // Verificar se já está logado
    firebase.auth().onAuthStateChanged(async (user) => {
      if (user) {
        const perfil = await obterPerfilUsuario(user.uid);
        if (perfil && perfil.role === 'admin') {
          window.location.href = 'admin.html';
        } else {
          window.location.href = 'cliente.html';
        }
      }
    });
  </script>
</body>
</html>
